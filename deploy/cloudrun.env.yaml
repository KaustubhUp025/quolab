# Single source of truth for quolab's Cloud Run env (deploy via --env-vars-file).
# Secrets (QUOLAB_GEMINI_API_KEY, QUOLAB_PG_DSN, QUOLAB_GITLAB_TOKEN) come from
# Secret Manager via --set-secrets, NOT from this file.
QUOLAB_EMBEDDER: "gemini"
QUOLAB_EMBED_MODEL: "gemini-embedding-001"
QUOLAB_EMBED_DIM: "768"
# sqlite-vec (numpy cosine + FTS5) — zero-infra. Kept warm via Cloud Run
# min-instances=1; pre-warm target repos with POST /index after each deploy
# (a cold start loses the in-instance index). Switch to pgvector for a
# persistent, cold-start-surviving index.
QUOLAB_STORE: "sqlite"
QUOLAB_FETCH: "git"
QUOLAB_GITLAB_URL: "https://gitlab.com"
# Security posture for the exposed service: only clone from these hosts, and never
# index arbitrary local paths off the container filesystem.
QUOLAB_FETCH_ALLOW_HOSTS: "gitlab.com"
QUOLAB_ALLOW_LOCAL_PATH: "false"
# Auto-index: /search self-indexes an unindexed repo on first use (and self-heals
# after a cold start). SAFE ONLY because this deployment is IAM-locked (run.invoker
# limited to Quorum's service accounts) AND API-key gated — so only Quorum can ever
# trigger a clone. Do NOT enable on a publicly reachable quolab. Builds are serialized
# per project by an in-process lock (engine.py). Cap result fan-out below.
QUOLAB_ALLOW_AUTO_INDEX: "true"
QUOLAB_MAX_RESULTS_CAP: "25"
QUOLAB_HOST: "0.0.0.0"
QUOLAB_PORT: "8080"
QUOLAB_LOG_LEVEL: "info"
