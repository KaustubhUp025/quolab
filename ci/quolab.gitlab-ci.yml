# quolab GitLab CI template — include it to add semantic search + a merge gate to any
# project WITHOUT GitLab Ultimate.
#
#   include:
#     - remote: 'https://raw.githubusercontent.com/KaustubhUp025/quolab/main/ci/quolab.gitlab-ci.yml'
#
# Provide QUOLAB_GEMINI_API_KEY as a CI/CD variable for real semantic search;
# omit it to run the offline 'hash' embedder (lexical/hybrid still work).

.quolab_base:
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install "quolab[treesitter] @ git+https://github.com/KaustubhUp025/quolab"
  variables:
    QUOLAB_EMBEDDER: "${QUOLAB_GEMINI_API_KEY:+gemini}"   # 'gemini' if key set, else empty

quolab-index:
  extends: .quolab_base
  stage: test
  script:
    - export QUOLAB_EMBEDDER="${QUOLAB_EMBEDDER:-hash}"
    - quolab index .
    - quolab status . || true

# Optional merge gate: fail the pipeline when a quolab/Quorum SARIF has blocking findings.
quolab-merge-gate:
  extends: .quolab_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists: [quorum.sarif]
  script:
    - python -m quolab.policy_cli quorum.sarif --policy .quolab-policy.yml
