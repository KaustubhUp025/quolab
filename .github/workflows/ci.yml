name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,treesitter,mcp]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src || true   # advisory, non-blocking
      - name: Tests
        run: pytest -q

  dogfood-benchmark:
    # quolab proves its own retrieval quality on every PR (fully offline: hash embedder).
    # Gate is found@5; the run also reports NDCG@10 (the CoIR-standard ranking metric).
    # The full leaderboard-comparable CoIR eval (bench/coir_eval.py) is manual/nightly —
    # it needs network + a real model, so it is deliberately not in this fast gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[treesitter]"
      - name: Retrieval benchmark (gate + NDCG@10)
        env:
          QUOLAB_EMBEDDER: hash
          QUOLAB_BENCH_MIN: "0.8"
        run: python bench/run_bench.py .

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    # publishes on a GitHub Release using PyPI Trusted Publishing (OIDC, no token)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-image:
    # publishes a container image to GHCR on a GitHub Release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.ref_name }}
