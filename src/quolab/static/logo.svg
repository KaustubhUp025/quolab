<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 40" width="172" height="40" role="img" aria-label="Quolab">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Quolab mark: Quorum's consensus ring reused as the LENS of a magnifying glass
       (lineage to Quorum) + a handle = semantic code SEARCH, Quolab's core feature. -->
  <g transform="translate(19,18)">
    <!-- handle -->
    <line x1="9.5" y1="9.5" x2="18" y2="18" stroke="url(#qg)" stroke-width="4.2" stroke-linecap="round"/>
    <!-- lens = the consensus ring -->
    <circle r="12.5" fill="#0f172a" stroke="url(#qg)" stroke-width="3"/>
    <!-- consensus nodes around the center -->
    <circle cx="0" cy="-12.5" r="2.9" fill="#a855f7"/>
    <circle cx="10.8" cy="6.25" r="2.9" fill="#6366f1"/>
    <circle cx="-10.8" cy="6.25" r="2.9" fill="#6366f1"/>
    <circle cx="0" cy="0" r="2.7" fill="#e2e8f0"/>
    <!-- quorum links to center -->
    <g stroke="#475569" stroke-width="1.1" opacity="0.9">
      <line x1="0" y1="0" x2="0" y2="-12.5"/>
      <line x1="0" y1="0" x2="10.8" y2="6.25"/>
      <line x1="0" y1="0" x2="-10.8" y2="6.25"/>
    </g>
  </g>
  <text x="46" y="27" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial" font-size="22" font-weight="700" fill="#e2e8f0">Quo<tspan fill="#a855f7">lab</tspan></text>
</svg>
